<!doctype html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>آسيا برو | الفخامة العصرية</title>

    <meta property="og:title" content="آسيا | الموضة العصرية">
    <meta property="og:image" content="https://l.top4top.io/p_3759paqj21.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet" />
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --p: #ec4899; --d: #0f172a; --s: #f8fafc;
            --shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Cairo", sans-serif; transition: 0.3s; }
        body { background: #f1f5f9; color: var(--d); overflow-x: hidden; }

        /* Navbar */
        nav { position: sticky; top: 0; background: rgba(255,255,255,0.9); backdrop-filter: blur(15px); z-index: 1000; border-bottom: 1px solid #eee; }
        .nav-inner { max-width: 1200px; margin: auto; padding: 12px 5%; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 2rem; font-weight: 900; background: linear-gradient(45deg, var(--d), var(--p)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; cursor: pointer; }
        .cart-btn { background: var(--d); color: white; padding: 8px 20px; border-radius: 50px; cursor: pointer; display: flex; align-items: center; gap: 8px; position: relative; }
        #c-count { background: var(--p); color: white; font-size: 0.7rem; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; position: absolute; top: -5px; right: -5px; border: 2px solid white; }

        /* Search & Hero */
        .search-area { background: white; padding: 20px 5%; text-align: center; border-bottom: 1px solid #f0f0f0; }
        .search-input { max-width: 600px; width: 100%; padding: 15px 25px; border-radius: 100px; border: 2px solid #eee; outline: none; font-size: 1rem; }
        .search-input:focus { border-color: var(--p); box-shadow: var(--shadow); }

        /* Featured Scroll (وصل حديثاً) */
        .f-header { padding: 30px 5% 10px; display: flex; align-items: center; gap: 10px; max-width: 1200px; margin: auto; }
        .f-scroll { display: flex; gap: 15px; overflow-x: auto; padding: 10px 5%; scrollbar-width: none; }
        .f-scroll::-webkit-scrollbar { display: none; }
        .f-item { min-width: 250px; background: white; border-radius: 20px; overflow: hidden; box-shadow: var(--shadow); cursor: pointer; flex-shrink: 0; position: relative; }
        .f-item img { width: 100%; height: 280px; object-fit: cover; }

        /* Categories */
        .cats-bar { display: flex; gap: 10px; overflow-x: auto; padding: 20px 5%; scrollbar-width: none; }
        .cat-btn { padding: 8px 22px; background: white; border-radius: 50px; cursor: pointer; white-space: nowrap; border: 1px solid #eee; font-weight: 600; }
        .cat-btn.active { background: var(--p); color: white; border-color: var(--p); }

        /* Grid */
        .main-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 25px; padding: 0 5% 100px; max-width: 1200px; margin: auto; }
        .p-card { background: white; border-radius: 20px; overflow: hidden; box-shadow: var(--shadow); position: relative; display: flex; flex-direction: column; }
        .p-card img { width: 100%; aspect-ratio: 3/4; object-fit: cover; cursor: pointer; }
        .p-info { padding: 20px; text-align: center; flex-grow: 1; }
        .p-price { color: var(--p); font-size: 1.3rem; font-weight: 900; margin: 10px 0; }
        .p-old { text-decoration: line-through; color: #999; font-size: 0.9rem; margin-right: 8px; font-weight: 400; }
        .disc-tag { position: absolute; top: 15px; right: 15px; background: #ff4d4d; color: white; padding: 4px 12px; border-radius: 8px; font-weight: 900; font-size: 0.8rem; z-index: 10; }

        .btn-add { width: 100%; padding: 12px; border-radius: 12px; border: none; background: var(--d); color: white; font-weight: 700; cursor: pointer; margin-top: auto; }
        .btn-add:hover { background: var(--p); }

        /* Product Detail Panel */
        #p-detail { position: fixed; inset: 0; background: white; z-index: 3000; display: none; overflow-y: auto; padding: 40px 5%; }
        .detail-grid { max-width: 1100px; margin: auto; display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }

        /* Cart Sidebar */
        #cart-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); z-index: 2000; display: none; }
        .cart-panel { position: absolute; left: 0; top: 0; width: 100%; max-width: 400px; height: 100%; background: white; padding: 30px; display: flex; flex-direction: column; }

        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--d); color: white; padding: 12px 30px; border-radius: 50px; z-index: 5000; display: none; }
        .wa-float { position: fixed; bottom: 20px; left: 20px; background: #25d366; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; z-index: 1500; text-decoration: none; box-shadow: var(--shadow); }

        @media (max-width: 768px) { .detail-grid { grid-template-columns: 1fr; } .main-grid { grid-template-columns: repeat(2, 1fr); gap: 15px; } }
    </style>
</head>
<body>

    <nav>
        <div class="nav-inner">
            <div class="logo" onclick="location.reload()">ASIA</div>
            <div class="cart-btn" onclick="toggleCart()">
                <span>السلة</span> <span id="c-count">0</span>
            </div>
        </div>
    </nav>

    <div class="search-area">
        <input type="text" id="p-search" class="search-input" placeholder="ابحثي عما يبرز جمالك..." onkeyup="renderProds()">
    </div>

    <div class="f-header">
        <span style="background:var(--p); color:white; padding:2px 8px; border-radius:5px; font-size:0.7rem;">حصري</span>
        <h2 style="font-weight:900;">وصل حديثاً</h2>
    </div>
    <div class="f-scroll" id="f-list"></div>

    <div class="cats-bar" id="cats-list">
        <div class="cat-btn active" onclick="setCat('all', this)">كل المجموعات</div>
    </div>

    <div class="main-grid" id="p-grid"></div>

    <div id="p-detail">
        <div class="detail-grid" id="p-content"></div>
    </div>

    <div id="cart-modal">
        <div class="cart-panel">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h2 style="font-weight:900;">حقيبة التسوق</h2>
                <span onclick="toggleCart()" style="cursor:pointer; font-size:1.5rem;">✕</span>
            </div>
            <div id="cart-items" style="flex-grow:1; overflow-y:auto;"></div>
            <div style="border-top:1px solid #eee; padding-top:20px;">
                <div style="display:flex; justify-content:space-between; font-size:1.4rem; font-weight:900; margin-bottom:15px;">
                    <span>الإجمالي:</span> <span id="total-price">0</span>
                </div>
                <input type="text" id="u-name" placeholder="الاسم الكامل" style="width:100%; padding:12px; border-radius:10px; border:1px solid #ddd; margin-bottom:10px;">
                <input type="text" id="u-addr" placeholder="العنوان بالتفصيل" style="width:100%; padding:12px; border-radius:10px; border:1px solid #ddd; margin-bottom:20px;">
                <button onclick="sendWA()" style="width:100%; background:#22c55e; color:white; border:none; padding:15px; border-radius:12px; font-weight:900; cursor:pointer;">تأكيد عبر واتساب</button>
            </div>
        </div>
    </div>

    <a href="https://wa.me/201288660002" class="wa-float">💬</a>
    <div id="toast" class="toast"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCJafwdQ9ZWztGA1IcYF4vtGuqHCWSWgRI",
            authDomain: "asia-6709b.firebaseapp.com",
            databaseURL: "https://asia-6709b-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "asia-6709b",
            storageBucket: "asia-6709b.firebasestorage.app",
            messagingSenderId: "193795497650",
            appId: "1:193795497650:web:dbd5a7a8661b952a2633ab"
        };

        firebase.initializeApp(firebaseConfig);
        const dbRef = firebase.database();

        let prods = [], cart = JSON.parse(localStorage.getItem('asia_cart')) || [], curCat = "all";

        function init() {
            // جلب الأقسام
            dbRef.ref('categories').on('value', s => {
                const cats = s.val() ? Object.values(s.val()) : [];
                const div = document.getElementById('cats-list');
                div.innerHTML = `<div class="cat-btn ${curCat==='all'?'active':''}" onclick="setCat('all', this)">الكل</div>`;
                cats.forEach(c => div.innerHTML += `<div class="cat-btn" onclick="setCat('${c.id}', this)">${c.name}</div>`);
            });

            // جلب المنتجات
            dbRef.ref('products').on('value', s => {
                prods = s.val() ? Object.values(s.val()).reverse() : [];
                renderFeatured();
                renderProds();
                
                // Deep Link Check
                const pid = new URLSearchParams(window.location.search).get('id');
                if(pid) setTimeout(() => openProduct(pid), 1000);
            });
            updateCartUI();
        }

        function renderFeatured() {
            const list = prods.slice(0, 6);
            document.getElementById('f-list').innerHTML = list.map(p => `
                <div class="f-item" onclick="openProduct('${p.id}')">
                    <img src="${p.image}">
                    <div style="padding:15px; position:absolute; bottom:0; left:0; right:0; background:linear-gradient(transparent, rgba(0,0,0,0.8)); color:white;">
                        <div style="font-weight:700;">${p.name}</div>
                        <div style="font-size:0.9rem;">${p.price} ج.م</div>
                    </div>
                </div>
            `).join('');
        }

        function renderProds() {
            const term = document.getElementById('p-search').value.toLowerCase();
            const grid = document.getElementById('p-grid');
            const filtered = prods.filter(p => (curCat === "all" || p.category_id === curCat) && p.name.toLowerCase().includes(term));

            grid.innerHTML = filtered.map(p => {
                const hasDisc = p.old_price && parseInt(p.old_price) > parseInt(p.price);
                const perc = hasDisc ? Math.round(((p.old_price - p.price) / p.old_price) * 100) : 0;
                
                return `
                <div class="p-card">
                    ${hasDisc ? `<div class="disc-tag">-${perc}% خصم</div>` : ''}
                    <img src="${p.image}" onclick="openProduct('${p.id}')">
                    <div class="p-info">
                        <h3 style="font-size:1rem; font-weight:700;">${p.name}</h3>
                        <div class="p-price">
                            ${p.price} ج.م
                            ${hasDisc ? `<span class="p-old">${p.old_price} ج.م</span>` : ''}
                        </div>
                        <button class="btn-add" onclick="addToCart('${p.id}')">أضف للسلة 🛍️</button>
                    </div>
                </div>`;
            }).join('');
        }

        function openProduct(id) {
            const p = prods.find(x => x.id == id);
            if(!p) return;
            document.getElementById('p-content').innerHTML = `
                <img src="${p.image}" style="width:100%; border-radius:25px; box-shadow:var(--shadow);">
                <div>
                    <button onclick="closeProduct()" style="margin-bottom:20px; cursor:pointer; padding:8px 20px; border-radius:50px; border:1px solid #ddd;">← عودة</button>
                    <h1 style="font-size:2.5rem; margin-bottom:10px; font-weight:900;">${p.name}</h1>
                    <div style="font-size:1.8rem; color:var(--p); font-weight:900; margin-bottom:20px;">
                        ${p.price} ج.م 
                        ${p.old_price ? `<span style="text-decoration:line-through; color:#999; font-size:1.2rem; margin-right:15px; font-weight:400;">${p.old_price} ج.م</span>` : ''}
                    </div>
                    <p style="line-height:2; color:#555; background:#f8fafc; padding:20px; border-radius:15px; margin-bottom:25px;">${p.description || "قطعة مميزة تم اختيارها بعناية لتناسب ذوقك الرفيع."}</p>
                    <div style="display:flex; gap:10px;">
                        <button class="btn-add" onclick="addToCart('${p.id}'); closeProduct();" style="padding:18px; font-size:1.2rem; flex:2;">إضافة للسلة 🛒</button>
                        <button onclick="shareProd('${p.id}', '${p.name}')" style="background:#eee; border:none; padding:15px; border-radius:12px; cursor:pointer; flex:1;">مشاركة 🔗</button>
                    </div>
                </div>`;
            document.getElementById('p-detail').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function addToCart(id) {
            const p = prods.find(x => x.id == id);
            const inCart = cart.find(x => x.id == id);
            if(inCart) inCart.q++; else cart.push({...p, q:1});
            save(); updateCartUI();
            showToast(`تمت إضافة ${p.name} ✨`);
        }

        function updateCartUI() {
            document.getElementById('c-count').innerText = cart.reduce((a, b) => a + b.q, 0);
            let total = 0;
            document.getElementById('cart-items').innerHTML = cart.map(i => {
                total += (i.price * i.q);
                return `
                <div style="display:flex; gap:12px; margin-bottom:15px; border-bottom:1px solid #f5f5f5; padding-bottom:10px;">
                    <img src="${i.image}" style="width:60px; height:70px; border-radius:10px; object-fit:cover;">
                    <div style="flex-grow:1;">
                        <div style="font-weight:700; font-size:0.9rem;">${i.name}</div>
                        <div style="color:var(--p); font-size:0.85rem;">${i.price} ج.م</div>
                        <div style="display:flex; align-items:center; gap:15px; margin-top:5px;">
                            <button onclick="changeQty('${i.id}', -1)" style="border:none; cursor:pointer; padding:2px 8px;">-</button>
                            <span>${i.q}</span>
                            <button onclick="changeQty('${i.id}', 1)" style="border:none; cursor:pointer; padding:2px 8px;">+</button>
                        </div>
                    </div>
                </div>`;
            }).join('');
            document.getElementById('total-price').innerText = total + ' ج.م';
        }

        function changeQty(id, d) {
            const i = cart.find(x => x.id == id); i.q += d;
            if(i.q <= 0) cart = cart.filter(x => x.id != id);
            save(); updateCartUI();
        }

        function sendWA() {
            const n = document.getElementById('u-name').value, a = document.getElementById('u-addr').value;
            if(!n || !a || cart.length === 0) return alert("برجاء إدخال البيانات");
            let t = `طلب جديد - آسيا 💎\nالاسم: ${n}\nالعنوان: ${a}\n\nالمنتجات:\n`;
            cart.forEach(i => t += `- ${i.name} (${i.q}) = ${i.price * i.q} ج.م\n`);
            t += `\nالإجمالي: ${document.getElementById('total-price').innerText}`;
            window.open(`https://wa.me/201288660002?text=${encodeURIComponent(t)}`);
        }

        function shareProd(id, name) {
            const url = `${window.location.origin}${window.location.pathname}?id=${id}`;
            if(navigator.share) navigator.share({title: name, url: url});
            else { navigator.clipboard.writeText(url); showToast("تم نسخ الرابط 📋"); }
        }

        function save() { localStorage.setItem('asia_cart', JSON.stringify(cart)); }
        function toggleCart() { const m = document.getElementById('cart-modal'); m.style.display = m.style.display === 'block' ? 'none' : 'block'; }
        function closeProduct() { document.getElementById('p-detail').style.display = 'none'; document.body.style.overflow = 'auto'; }
        function setCat(id, el) { curCat = id; document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active')); el.classList.add('active'); renderProds(); }
        function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.display = 'block'; setTimeout(() => t.style.display='none', 2500); }

        init();
    </script>
</body>
</html>
