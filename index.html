<!doctype html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>آسيا | الموضة العصرية</title>

    <meta name="description" content="متجر آسيا للموضة العصرية - أحدث أزياء السيدات بجودة عالية وتوصيل سريع لجميع المحافظات.">
    <meta name="keywords" content="ملابس نسائية, موضة, آسيا, فساتين, متجر ملابس مصر, ملابس عصرية">
    <meta name="google-site-verification" content="v9y5eUzOnJQjU0GY5MOljS9BN1lsqul-gD8RGDILqmY" />

    <meta property="og:title" content="آسيا | الموضة العصرية">
    <meta property="og:description" content="تسوقي أحدث الأزياء العصرية بلمسة راقية ✨ اطلبي الآن عبر الواتساب.">
    <meta property="og:image" content="https://l.top4top.io/p_3759paqj21.jpg">
    <meta property="og:url" content="https://asia-two.vercel.app/">
    <meta property="og:type" content="website">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet" />

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #ec4899;
            --dark: #0f172a;
            --soft-pink: #fdf2f8;
            --white: #ffffff;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            --glass: rgba(255, 255, 255, 0.85);
        }

        * { box-sizing: border-box; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); font-family: "Cairo", sans-serif; }
        body { margin: 0; background: #fafafa; color: var(--dark); overflow-x: hidden; }

        /* Header */
        header { position: sticky; top: 0; background: var(--glass); backdrop-filter: blur(12px); z-index: 1000; padding: 12px 0; border-bottom: 2px solid var(--soft-pink); }
        .nav-inner { width: 92%; max-width: 1200px; margin: auto; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 2rem; font-weight: 900; letter-spacing: -1px; background: linear-gradient(45deg, var(--dark), var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; cursor: pointer; }
        .cart-btn { background: var(--dark); color: white; padding: 8px 18px; border-radius: 50px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-weight: 600; }
        .cart-btn:hover { background: var(--primary); transform: scale(1.05); }
        #c-count { background: white; color: var(--primary); font-size: 0.75rem; min-width: 20px; height: 20px; border-radius: 10px; display: flex; align-items: center; justify-content: center; }

        /* Hero */
        .hero { padding: 60px 20px; background: linear-gradient(to bottom, var(--soft-pink), #fff); text-align: center; }
        .hero h1 { font-size: 2.5rem; margin-bottom: 10px; font-weight: 900; }
        .search-box { position: relative; max-width: 500px; margin: 30px auto 0; }
        input#search { width: 100%; padding: 15px 25px; border-radius: 100px; border: 2px solid transparent; background: white; box-shadow: var(--shadow); outline: none; font-size: 1rem; }
        input#search:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(236, 72, 153, 0.1); }

        /* Filters */
        .filters { display: flex; gap: 12px; margin: 30px 0; overflow-x: auto; padding: 10px 20px; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
        .filters::-webkit-scrollbar { display: none; }
        .filters span { padding: 10px 22px; background: white; border-radius: 50px; cursor: pointer; font-weight: 600; box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05); white-space: nowrap; border: 1px solid #eee; flex-shrink: 0; }
        .filters span.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 25px; width: 92%; max-width: 1200px; margin: 0 auto 100px; }
        .card { background: white; border-radius: 20px; overflow: hidden; box-shadow: var(--shadow); display: flex; flex-direction: column; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.12); }
        .card img { width: 100%; aspect-ratio: 3/4; object-fit: cover; cursor: zoom-in; }
        .card-body { padding: 18px; text-align: center; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .price { color: var(--primary); font-size: 1.3rem; font-weight: 900; margin-bottom: 15px; }
        .add-btn { background: var(--dark); color: white; border: none; width: 100%; padding: 12px; border-radius: 12px; cursor: pointer; font-weight: 700; }
        .add-btn:hover { background: var(--primary); }

        /* Modals & Pages */
        .product-page { display: none; position: fixed; inset: 0; background: var(--white); z-index: 3000; overflow-y: auto; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .pp-container { width: 92%; max-width: 1000px; margin: 20px auto; padding-bottom: 50px; }
        .pp-header { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; position: sticky; top: 0; background: white; }
        .pp-close { font-size: 1.5rem; cursor: pointer; background: #eee; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .pp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-top: 20px; }
        .pp-image img { width: 100%; border-radius: 20px; box-shadow: var(--shadow); }

        /* Cart */
        #cart-modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(8px); z-index: 2000; }
        .cart-content { background: white; width: 100%; max-width: 450px; height: 100%; margin-right: auto; padding: 40px 25px; display: flex; flex-direction: column; animation: slideIn 0.4s ease-out; }
        @keyframes slideIn { from { transform: translateX(-100%); } to { transform: translateX(0); } }
        .qty-controls { background: #f1f1f1; border-radius: 8px; padding: 2px 8px; display: flex; align-items: center; gap: 10px; }

        /* Featured Scroll */
        .featured-header { width: 92%; max-width: 1200px; margin: 40px auto 10px; display: flex; align-items: center; gap: 10px; }
        .featured-scroll { display: flex; gap: 20px; overflow-x: auto; padding: 20px 4%; scrollbar-width: none; background: linear-gradient(to bottom, #fff, #fff5f8); }
        .featured-item { min-width: 280px; background: white; border-radius: 15px; box-shadow: var(--shadow); cursor: pointer; }

        /* Floating & Toast */
        .whatsapp-float { position: fixed; bottom: 20px; left: 20px; background: #25d366; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 1500; text-decoration: none; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 70% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--dark); color: white; padding: 12px 25px; border-radius: 50px; font-weight: 600; z-index: 5000; display: none; animation: fadeInUp 0.4s ease; }
        @keyframes fadeInUp { from { opacity: 0; bottom: 10px; } to { opacity: 1; bottom: 30px; } }

        @media (max-width: 768px) { .pp-grid { grid-template-columns: 1fr; } .grid { grid-template-columns: repeat(2, 1fr); gap: 12px; } }
    </style>
</head>
<body>

    <header>
        <div class="nav-inner">
            <div class="logo" onclick="window.location.reload()">آسيا</div>
            <div class="cart-btn" onclick="toggleCart()">
                <span>سلة التسوق</span>
                <span id="c-count">0</span>
            </div>
        </div>
    </header>

    <div class="hero">
        <h1>إطلالة ساحرة.. لكل وقت 👗</h1>
        <p>اكتشفي أرقى الموديلات المختارة بعناية</p>
        <div class="search-box">
            <input type="text" id="search" placeholder="ابحثي بالاسم..." onkeyup="renderProds()" />
        </div>
    </div>

    <div class="featured-header">
        <span style="background:var(--primary); color:white; padding:2px 10px; border-radius:5px; font-size:0.8rem;">جديد</span>
        <h2>وصل حديثاً</h2>
    </div>
    <div class="featured-scroll" id="featured-list"></div>

    <div class="filters" id="cats">
        <span class="active" onclick="setCat('all', this)">كل المجموعات</span>
    </div>

    <div class="grid" id="products"></div>

    <div id="cart-modal">
        <div class="cart-content">
            <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid #f1f1f1; padding-bottom:15px;">
                <h2>حقيبة التسوق</h2>
                <span style="cursor:pointer; font-size:1.5rem;" onclick="toggleCart()">✕</span>
            </div>
            <div id="cart-list" style="flex-grow:1; overflow-y:auto; margin:20px 0;"></div>
            <div style="background:#f8fafc; padding:20px; border-radius:15px;">
                <div style="display:flex; justify-content:space-between; font-size:1.3rem; font-weight:900; margin-bottom:15px;">
                    <span>الإجمالي:</span>
                    <span><span id="total">0</span> ج.م</span>
                </div>
                <input type="text" id="u-name" placeholder="الاسم بالكامل" style="width:100%; padding:12px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px;" />
                <input type="text" id="u-addr" placeholder="عنوان التوصيل" style="width:100%; padding:12px; margin-bottom:15px; border:1px solid #ddd; border-radius:8px;" />
                <button onclick="sendOrder()" style="width:100%; background:#22c55e; color:white; border:none; padding:16px; border-radius:12px; font-weight:700; cursor:pointer;">تأكيد الطلب (واتساب)</button>
            </div>
        </div>
    </div>

    <div id="product-page" class="product-page">
        <div class="pp-container">
            <div class="pp-header">
                <div class="pp-close" onclick="closeProductPage()">✕</div>
                <div class="logo">آسيا</div>
            </div>
            <div id="pp-content" class="pp-grid"></div>
        </div>
    </div>

    <a href="https://wa.me/201288660002" class="whatsapp-float" target="_blank">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="35" alt="WhatsApp">
    </a>

    <div id="toast" class="toast"></div>

    <script>
        // 1. إعدادات Firebase الخاصة بك
        const firebaseConfig = {
            apiKey: "AIzaSyCJafwdQ9ZWztGA1IcYF4vtGuqHCWSWgRI",
            authDomain: "asia-6709b.firebaseapp.com",
            databaseURL: "https://asia-6709b-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "asia-6709b",
            storageBucket: "asia-6709b.firebasestorage.app",
            messagingSenderId: "193795497650",
            appId: "1:193795497650:web:dbd5a7a8661b952a2633ab",
            measurementId: "G-Y7EM6NTNH4"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let db = { products: [], cart: [] },
            curCat = "all";

        async function init() {
            // جلب المنتجات
            database.ref('products').on('value', (snap) => {
                const data = snap.val();
                db.products = data ? Object.values(data) : [];
                renderFeatured();
                renderProds();
            });

            // جلب الأقسام
            database.ref('categories').on('value', (snap) => {
                const cats = snap.val();
                renderCats(cats ? Object.values(cats) : []);
            });

            // فحص الرابط لفتح منتج معين
            const pid = new URLSearchParams(window.location.search).get('id');
            if (pid) setTimeout(() => openProductPage(pid), 1500);
        }

        function renderCats(list) {
            const div = document.getElementById("cats");
            div.innerHTML = `<span class="${curCat==='all'?'active':''}" onclick="setCat('all', this)">كل المجموعات</span>`;
            list.forEach(c => {
                div.innerHTML += `<span onclick="setCat('${c.id}', this)">${c.name}</span>`;
            });
        }

        function renderFeatured() {
            const list = db.products.slice(0, 6);
            document.getElementById("featured-list").innerHTML = list.map(p => `
                <div class="featured-item" onclick="openProductPage('${p.id}')">
                    <img src="${p.image}" style="width:100%; height:200px; object-fit:cover; border-radius:15px 15px 0 0;">
                    <div style="padding:15px;">
                        <strong>${p.name}</strong>
                        <div style="color:var(--primary); font-weight:bold;">${p.price} ج.م</div>
                    </div>
                </div>
            `).join('');
        }

        function renderProds() {
            const grid = document.getElementById("products");
            const term = document.getElementById("search").value.toLowerCase();
            const filtered = db.products.filter(p => 
                (curCat === "all" || p.category_id === curCat) && 
                p.name.toLowerCase().includes(term)
            );

            grid.innerHTML = filtered.map(p => `
                <div class="card">
                    <img src="${p.image}" alt="${p.name}" onclick="openProductPage('${p.id}')">
                    <div class="card-body">
                        <h3 style="font-size:1.1rem; margin:0 0 8px; font-weight:700;">${p.name}</h3>
                        <div class="price">${p.price} ج.م</div>
                        <button class="add-btn" onclick="addToCart('${p.id}')">إضافة للسلة 🛍️</button>
                    </div>
                </div>
            `).join("");
        }

        function openProductPage(id) {
            const p = db.products.find(x => x.id == id);
            if(!p) return;
            document.getElementById("pp-content").innerHTML = `
                <div class="pp-image"><img src="${p.image}"></div>
                <div class="pp-details">
                    <h1 style="font-size:2rem; margin-top:0;">${p.name}</h1>
                    <div style="font-size:1.8rem; color:var(--primary); font-weight:900; margin:15px 0;">${p.price} ج.م</div>
                    <p style="line-height:1.8; color:#555;">${p.description || "قطعة مميزة من تشكيلة آسيا، صُممت بعناية لتناسب ذوقك الرفيع."}</p>
                    <button class="order-btn" onclick="addToCart('${p.id}'); closeProductPage();" style="width:100%; background:var(--dark); color:white; border:none; padding:16px; border-radius:12px; font-weight:700; cursor:pointer;">إضافة لحقيبة التسوق 🛍️</button>
                    <button onclick="shareProduct('${p.id}', '${p.name}')" style="width:100%; background:#f1f1f1; border:1px solid #ddd; padding:12px; border-radius:10px; font-weight:700; cursor:pointer; margin-top:10px;">مشاركة المنتج 🔗</button>
                </div>`;
            document.getElementById("product-page").style.display = "block";
            document.body.style.overflow = "hidden";
        }

        function closeProductPage() {
            document.getElementById("product-page").style.display = "none";
            document.body.style.overflow = "auto";
        }

        function addToCart(id) {
            const p = db.products.find(x => x.id == id);
            const inCart = db.cart.find(x => x.id == id);
            if (inCart) inCart.q++; else db.cart.push({ ...p, q: 1 });
            updateCart();
            showToast(`تمت إضافة ${p.name} للسلة ✨`);
        }

        function updateCart() {
            document.getElementById("c-count").innerText = db.cart.reduce((a, b) => a + b.q, 0);
            let total = 0;
            document.getElementById("cart-list").innerHTML = db.cart.map(i => {
                total += (parseInt(i.price) * i.q);
                return `
                <div style="display:flex; align-items:center; gap:15px; margin-bottom:15px; border-bottom:1px solid #f9f9f9; padding-bottom:10px;">
                    <img src="${i.image}" style="width:60px; height:60px; border-radius:10px; object-fit:cover;">
                    <div style="flex-grow:1;">
                        <strong>${i.name}</strong>
                        <div>${i.price} ج.م</div>
                        <div class="qty-controls" style="width:fit-content; margin-top:5px;">
                            <button style="border:none; background:none; color:var(--primary); font-weight:bold; cursor:pointer;" onclick="changeQty('${i.id}', -1)">-</button>
                            <span>${i.q}</span>
                            <button style="border:none; background:none; color:var(--primary); font-weight:bold; cursor:pointer;" onclick="changeQty('${i.id}', 1)">+</button>
                        </div>
                    </div>
                    <div style="color:#ff4d4d; cursor:pointer; font-size:0.8rem;" onclick="changeQty('${i.id}', -${i.q})">حذف</div>
                </div>`;
            }).join("");
            document.getElementById("total").innerText = total;
        }

        function changeQty(id, delta) {
            const item = db.cart.find(x => x.id == id);
            item.q += delta;
            if (item.q <= 0) db.cart = db.cart.filter(x => x.id != id);
            updateCart();
        }

        function toggleCart() {
            const m = document.getElementById("cart-modal");
            m.style.display = m.style.display === "block" ? "none" : "block";
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.style.display = 'block';
            setTimeout(() => { t.style.display = 'none'; }, 2500);
        }

        async function shareProduct(id, name) {
            const url = `${window.location.origin}${window.location.pathname}?id=${id}`;
            if (navigator.share) {
                await navigator.share({ title: `آسيا | ${name}`, text: `بصي القطعة دي تجنن! ✨`, url: url });
            } else {
                navigator.clipboard.writeText(url);
                showToast("تم نسخ رابط المنتج 📋");
            }
        }

        function sendOrder() {
            const name = document.getElementById("u-name").value, addr = document.getElementById("u-addr").value;
            if (!name || !addr || db.cart.length === 0) return alert("برجاء إدخال البيانات والمنتجات");
            let txt = `طلب جديد من متجر آسيا 🌸\n\nالاسم: ${name}\nالعنوان: ${addr}\n\nالمنتجات:\n`;
            db.cart.forEach(i => { txt += `- ${i.name} | العدد: ${i.q} | السعر: ${i.price * i.q} ج.م\n`; });
            txt += `\nإجمالي الحساب: ${document.getElementById("total").innerText} ج.م`;
            window.open(`https://wa.me/201288660002?text=${encodeURIComponent(txt)}`, "_blank");
        }

        function setCat(id, el) {
            curCat = id;
            document.querySelectorAll(".filters span").forEach(s => s.classList.remove("active"));
            el.classList.add("active");
            renderProds();
        }

        init();
    </script>
</body>
</html>
